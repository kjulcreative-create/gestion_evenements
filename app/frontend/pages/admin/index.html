<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHub — Admin Dashboard</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <main>

    <!-- ═══ HERO ═══ -->
    <section class="dash-hero">
      <div class="container dash-hero-inner">
        <div class="dash-hero-left">
          <div class="dash-eyebrow">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Administration
          </div>
          <h1 class="dash-title"><span class="dash-title-gradient">Dashboard</span></h1>
          <p class="dash-subtitle" id="dash-date-line">Vue d'ensemble de vos événements</p>
        </div>
        <div class="dash-hero-right">
          <a href="create.html" class="btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nouvel événement
          </a>
          <!-- <a href="/pages/visiteur/index.html" class="dash-view-btn" target="_blank">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Vue publique
          </a> -->
        </div>
      </div>
    </section>

    <div class="container">

      <!-- ═══ STATS ═══ -->
      <div class="dash-stats-grid">

        <div class="dash-stat-card" style="--sc:var(--accent);--sc-glow:var(--accent-glow)">
          <div class="dash-stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="dash-stat-body">
            <div class="dash-stat-value" id="stat-events">—</div>
            <div class="dash-stat-label">Événements</div>
          </div>
        </div>

        <div class="dash-stat-card" style="--sc:var(--rose);--sc-glow:var(--rose-glow)">
          <div class="dash-stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="dash-stat-body">
            <div class="dash-stat-value" id="stat-registrations">—</div>
            <div class="dash-stat-label">Inscriptions totales</div>
          </div>
        </div>

        <div class="dash-stat-card" style="--sc:var(--error);--sc-glow:var(--error-bg)">
          <div class="dash-stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          </div>
          <div class="dash-stat-body">
            <div class="dash-stat-value" style="color:var(--error)" id="stat-full">—</div>
            <div class="dash-stat-label">Événements complets</div>
          </div>
        </div>

        <div class="dash-stat-card" style="--sc:var(--success);--sc-glow:var(--success-bg)">
          <div class="dash-stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="dash-stat-body">
            <div class="dash-stat-value" style="color:var(--success)" id="stat-spots">—</div>
            <div class="dash-stat-label">Places disponibles</div>
          </div>
        </div>

      </div>

      <!-- ═══ TABLE ═══ -->
      <div class="dash-table-card">

        <div class="dash-table-toolbar">
          <div class="dash-table-title-group">
            <h2 class="dash-table-title">Tous les événements</h2>
            <span class="dash-event-count" id="dash-event-count"></span>
          </div>
          <div class="dash-toolbar-right">
            <div class="dash-search-wrap">
              <svg class="dash-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="search" id="dash-search" class="dash-search-input" placeholder="Rechercher…" autocomplete="off">
            </div>
            <div class="dash-filter-tabs" id="dash-filter-tabs">
              <button class="dash-filter-tab active" data-filter="all">Tous</button>
              <button class="dash-filter-tab" data-filter="available">Disponibles</button>
              <button class="dash-filter-tab" data-filter="full">Complets</button>
            </div>
          </div>
        </div>

        <div class="dash-table-scroll">
          <table class="dash-table">
            <thead>
              <tr>
                <th>Événement</th>
                <th>Date</th>
                <th>Remplissage</th>
                <th>Statut</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="events-tbody"></tbody>
          </table>
        </div>

      </div>

    </div><!-- /container -->
  </main>

  <footer id="app-footer"></footer>

  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/layout.js"></script>
  <script>Layout.initAdmin('dashboard');</script>
  <script src="../../js/admin/admin-list.js"></script>
  <script>
    // Date dans le hero
    const _dateLine = document.getElementById('dash-date-line');
    if (_dateLine) {
      _dateLine.textContent = new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    }
  </script>
</body>
</html>
