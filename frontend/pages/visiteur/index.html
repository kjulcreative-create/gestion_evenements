<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHub — Événements</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <!-- Hero — rangée unique -->
  <section class="visitor-hero-compact">
    <div class="container">
      <div class="visitor-hero-row">
        <div class="visitor-hero-icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="26" height="26" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5m-9-6h.008v.008H12v-.008ZM12 15h.008v.008H12V15Zm0 2.25h.008v.008H12v-.008ZM9.75 15h.008v.008H9.75V15Zm0 2.25h.008v.008H9.75v-.008ZM7.5 15h.008v.008H7.5V15Zm0 2.25h.008v.008H7.5v-.008Zm6.75-4.5h.008v.008h-.008v-.008Zm0 2.25h.008v.008h-.008V15Zm0 2.25h.008v.008h-.008v-.008Zm2.25-4.5h.008v.008H16.5v-.008Zm0 2.25h.008v.008H16.5V15Z"/>
          </svg>
        </div>
        <h1>Tous les événements <span class="gradient-text">à portée de main</span></h1>
        <span class="visitor-hero-eyebrow"><span class="dot-live"></span>Découvrez &amp; Réservez</span>
      </div>
    </div>
  </section>

  <!-- Barre de recherche + filtres — sticky sous la navbar -->
  <div class="search-sticky-wrap">
    <div class="container">

      <!-- Barre unifiée recherche + date -->
      <div class="search-bar-unified">
        <div class="search-field">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Rechercher un événement..." autocomplete="off" />
        </div>
        <div class="search-divider" aria-hidden="true"></div>
        <div class="date-field">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span class="date-label">Date</span>
          <input type="date" id="date-input" title="Filtrer par date" />
          <button type="button" class="date-clear-btn" id="date-clear-btn" aria-label="Effacer la date" hidden>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- Filtres rapides -->
      <div class="filter-row">
        <button class="filter-tag active" data-filter="all">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M3.75 6A.75.75 0 0 1 4.5 5.25h15a.75.75 0 0 1 0 1.5h-15A.75.75 0 0 1 3.75 6zm3 6a.75.75 0 0 1 .75-.75h9a.75.75 0 0 1 0 1.5h-9a.75.75 0 0 1-.75-.75zm3 6a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 0 1.5h-3a.75.75 0 0 1-.75-.75z"/></svg>
          Tous
        </button>
        <button class="filter-tag" data-filter="available">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
          Places disponibles
        </button>
        <button class="filter-tag" data-filter="full">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M18.364 18.364A9 9 0 0 0 5.636 5.636m12.728 12.728A9 9 0 0 1 5.636 5.636m12.728 12.728L5.636 5.636"/></svg>
          Complets
        </button>
      </div>

    </div>
  </div>

  <script>
    // Clear date button
    (function() {
      var dateInput = document.getElementById('date-input');
      var clearBtn  = document.getElementById('date-clear-btn');
      dateInput.addEventListener('change', function() {
        clearBtn.hidden = !this.value;
      });
      clearBtn.addEventListener('click', function() {
        dateInput.value = '';
        clearBtn.hidden = true;
        dateInput.dispatchEvent(new Event('input', { bubbles: true }));
        dateInput.dispatchEvent(new Event('change', { bubbles: true }));
      });
    })();
  </script>

  <!-- Grille d'événements -->
  <main class="container" style="padding-top:24px">
    <div class="events-count-bar" id="count-bar" style="display:none">
      <span class="events-count-label" id="count-label"></span>
    </div>
    <section id="events-grid" class="events-grid"></section>
  </main>

  <footer id="app-footer"></footer>

  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/layout.js"></script>
  <script>Layout.initVisitor('events');</script>
  <script src="../../js/visiteur/events-list.js"></script>
</body>
</html>
