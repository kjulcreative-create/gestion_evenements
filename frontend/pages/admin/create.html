<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventHub — Créer un événement</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <header id="app-header"></header>

  <main class="container">
    <div style="max-width:680px;margin:0 auto;padding-bottom:80px">

      <div style="padding:40px 0 8px">
        <a class="back-link" href="index.html">← Retour au dashboard</a>
        <h1 style="font-family:var(--font-display);font-size:clamp(1.6rem,3vw,2rem);font-weight:700;letter-spacing:-0.4px;background:linear-gradient(135deg,#1E1B4B,#7C3AED);-webkit-background-clip:text;background-clip:text;color:transparent;margin-top:8px">Créer un événement</h1>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-top:6px">Donnez vie à votre prochain événement en quelques clics.</p>
      </div>

      <div class="form-card">
        <form id="create-form" novalidate>
          <div class="field">
            <div class="label-row">
              <label for="title">Titre</label>
              <span class="char-count" id="title-count">0/100</span>
            </div>
            <input type="text" id="title" name="title" maxlength="100" placeholder="Ex. Conférence Tech 2026" autocomplete="off" />
            <span class="field-error" data-error="title"></span>
          </div>

          <div class="field">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Décrivez votre événement en quelques lignes…" style="min-height:120px"></textarea>
            <span class="field-error" data-error="description"></span>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="date">Date et heure</label>
              <input type="datetime-local" id="date" name="date" />
              <span class="field-error" data-error="date"></span>
            </div>
            <div class="field">
              <label for="capacity">Capacité max</label>
              <input type="number" id="capacity" name="capacity" min="1" placeholder="Ex. 100" />
              <span class="field-error" data-error="capacity"></span>
            </div>
          </div>

          <div class="field">
            <label for="location">Lieu</label>
            <input type="text" id="location" name="location" placeholder="Ex. Ouagadougou, Salle SIAO" autocomplete="off" />
            <span class="field-error" data-error="location"></span>
          </div>

          <button type="submit" class="btn btn-block" id="submit-btn" style="margin-top:8px">Créer l'événement</button>
        </form>
      </div>

    </div>
  </main>

  <script src="../../js/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/layout.js"></script>
  <script>Layout.initAdmin('create');</script>
  <script src="../../js/admin/admin-create.js"></script>
</body>
</html>
